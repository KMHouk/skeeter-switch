name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'src/functions/**'
      - 'src/shared/**'
      - 'src/index.ts'
      - 'host.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build TypeScript
        run: npm run build
      - name: Package for deployment
        run: |
          zip -r functions-package.zip dist/ host.json package.json
          npm ci --omit=dev
          zip -r functions-package.zip node_modules/
      - uses: actions/upload-artifact@v4 # TODO: pin to SHA — verify at https://github.com/actions/upload-artifact/releases
        with:
          name: functions-package
          path: functions-package.zip

  deploy:
    name: Deploy to Prod
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/download-artifact@v4 # TODO: pin to SHA — verify at https://github.com/actions/download-artifact/releases
        with:
          name: functions-package
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_FUNCTION_APP_NAME }} \
            --src functions-package.zip
