name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'src/functions/**'
      - 'src/shared/**'
      - 'src/index.ts'
      - 'host.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build TypeScript
        run: npm run build
      - name: Package for deployment
        run: |
          zip -r functions-package.zip dist/ host.json package.json
          npm ci --omit=dev
          zip -r functions-package.zip node_modules/
      - uses: actions/upload-artifact@v4 # TODO: pin to SHA — verify at https://github.com/actions/upload-artifact/releases
        with:
          name: functions-package
          path: functions-package.zip

  deploy:
    name: Deploy to Prod
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/download-artifact@v4 # TODO: pin to SHA — verify at https://github.com/actions/download-artifact/releases
        with:
          name: functions-package
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Upload package via Kudu VFS
        run: |
          TOKEN=$(az account get-access-token --query accessToken -o tsv)
          KUDU="https://${{ secrets.AZURE_FUNCTION_APP_NAME }}.scm.azurewebsites.net"

          echo "Uploading zip to /home/data/SitePackages/..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/octet-stream" \
            -H "If-Match: *" \
            --data-binary @functions-package.zip \
            "$KUDU/api/vfs/data/SitePackages/functions-package.zip")
          echo "Upload response: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Writing packagename.txt..."
          HTTP_CODE=$(echo -n "functions-package.zip" | curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/octet-stream" \
            -H "If-Match: *" \
            --data-binary @- \
            "$KUDU/api/vfs/data/SitePackages/packagename.txt")
          echo "packagename.txt response: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: packagename.txt write failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Restart and verify
        run: |
          echo "Restarting function app..."
          az functionapp restart \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          sleep 30

          echo "Verifying functions are loaded..."
          for i in $(seq 1 8); do
            FUNCS=$(az functionapp function list \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ secrets.AZURE_FUNCTION_APP_NAME }} \
              --query "length(@)" -o tsv 2>/dev/null || echo "0")
            echo "Attempt $i/8: Functions loaded = $FUNCS"
            if [ "$FUNCS" -gt "0" ]; then
              echo "Deployment verified successfully!"
              exit 0
            fi
            sleep 15
          done
          echo "WARNING: Functions not detected yet. Check Azure Portal."
          exit 0
