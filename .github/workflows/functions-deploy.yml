name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths: ['src/functions/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/functions/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: src/functions
      - name: Build TypeScript
        run: npm run build
        working-directory: src/functions
      - name: Package for deployment
        run: |
          cd src/functions
          zip -r ../../functions-package.zip . -x "node_modules/*" "src/*" "*.ts" ".git/*"
          # Include dist/ and production node_modules
          npm ci --omit=dev
          zip -r ../../functions-package.zip node_modules/
      - uses: actions/upload-artifact@v4
        with:
          name: functions-package
          path: functions-package.zip

  deploy-dev:
    name: Deploy to Dev
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/main' || inputs.environment == 'dev'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functions-package
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_FUNCTION_APP_NAME }} \
            --src functions-package.zip

  deploy-prod:
    name: Deploy to Prod
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: prod
    if: inputs.environment == 'prod'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functions-package
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_FUNCTION_APP_NAME }} \
            --src functions-package.zip
